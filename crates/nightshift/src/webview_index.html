<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calypso — Live Webview</title>

  <!-- Dependency tracking — must be the first script -->
  <script>window.__missingScripts = [];</script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"
          onerror="window.__missingScripts.push('js-yaml@4.1.0 — https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js')"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"
          onerror="window.__missingScripts.push('mermaid@10.9.0 — https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js')"></script>
  <script src="https://cdn.jsdelivr.net/npm/@maleta/blokjs/dist/blokjs.min.js"
          onerror="window.__missingScripts.push('@maleta/blokjs — https://cdn.jsdelivr.net/npm/@maleta/blokjs/dist/blokjs.min.js')"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
    }
    code, .mono { font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace; }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .logo { font-size: 0.9rem; font-weight: 700; color: #38bdf8; letter-spacing: -0.02em; white-space: nowrap; }
    .logo-sub { color: #475569; font-weight: 400; }
    .divider { color: #334155; }

    select {
      background: #0f172a;
      color: #f1f5f9;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: #38bdf8; }

    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #10b981; flex-shrink: 0;
      opacity: 0.35; transition: opacity 0.2s;
    }
    .live-dot.flash {
      opacity: 1;
      animation: live-pulse 0.8s ease-out forwards;
    }
    @keyframes live-pulse {
      0%   { transform: scale(1);   opacity: 1; }
      40%  { transform: scale(2);   opacity: 0.8; }
      100% { transform: scale(1);   opacity: 0.35; }
    }

    .tabs { margin-left: auto; display: flex; gap: 4px; }
    .tab {
      background: none; border: 1px solid #334155; border-radius: 6px;
      color: #64748b; padding: 5px 12px; font-size: 0.78rem;
      cursor: pointer; transition: all 0.12s; font-family: inherit;
    }
    .tab:hover { border-color: #475569; color: #94a3b8; }
    .tab.active { background: #38bdf810; border-color: #38bdf8; color: #38bdf8; }
    .tab.debug-tab.active { background: #8b5cf610; border-color: #8b5cf6; color: #a78bfa; }

    main { padding: 24px; max-width: 1600px; margin: 0 auto; }

    /* ── State panel ─────────────────────────────────────────────────────────── */
    .state-panel {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 14px 18px; margin-bottom: 16px;
      display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap;
    }
    .state-panel-item { display: flex; flex-direction: column; gap: 3px; }
    .state-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #475569; font-weight: 700; }
    .state-value { font-size: 0.82rem; color: #e2e8f0; font-family: ui-monospace, monospace; }
    .state-value.active { color: #38bdf8; }
    .state-value.none { color: #475569; font-style: italic; }
    .kind-badge {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 1px 6px; border-radius: 4px; text-transform: uppercase;
      letter-spacing: 0.06em; margin-left: 6px; vertical-align: middle;
    }
    .live-item { margin-left: auto; }

    /* ── Trigger panel ───────────────────────────────────────────────────────── */
    .trigger-panel {
      background: #1e293b; border: 1px solid #f59e0b55; border-radius: 8px;
      padding: 14px 18px; margin-bottom: 16px;
    }
    .trigger-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #f59e0b; margin-bottom: 10px; }
    .trigger-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .trigger-btn {
      background: #f59e0b15; border: 1px solid #f59e0b55; border-radius: 6px;
      color: #fbbf24; padding: 6px 14px; font-size: 0.78rem;
      cursor: pointer; transition: all 0.12s; font-family: ui-monospace, monospace;
    }
    .trigger-btn:hover { background: #f59e0b25; border-color: #f59e0b; color: #f59e0b; }

    /* ── Cron panel ──────────────────────────────────────────────────────────── */
    .cron-panel {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 14px 18px; margin-bottom: 16px;
    }
    .cron-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 10px; }
    .cron-row {
      display: flex; align-items: center; gap: 10px; padding: 5px 0;
      border-bottom: 1px solid #0f172a; flex-wrap: wrap;
    }
    .cron-row:last-child { border-bottom: none; }
    .cron-run-btn {
      background: #0ea5e915; border: 1px solid #0ea5e955; border-radius: 5px;
      color: #38bdf8; padding: 3px 10px; font-size: 0.73rem;
      cursor: pointer; transition: all 0.12s; font-family: inherit; white-space: nowrap;
    }
    .cron-run-btn:hover { background: #0ea5e925; border-color: #38bdf8; }
    .cron-name { font-family: ui-monospace, monospace; font-size: 0.78rem; color: #e2e8f0; }
    .cron-expr { font-family: ui-monospace, monospace; font-size: 0.72rem; color: #475569; }
    .cron-desc { font-size: 0.73rem; color: #64748b; flex: 1; }

    /* ── Legend ──────────────────────────────────────────────────────────────── */
    .legend {
      display: flex; gap: 14px; flex-wrap: wrap;
      margin-bottom: 14px; padding: 10px 14px;
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    }
    .leg { display: flex; align-items: center; gap: 6px; font-size: 0.74rem; color: #94a3b8; }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .active-legend { margin-left: auto; color: #f59e0b; font-size: 0.68rem; }

    /* ── Diagram ─────────────────────────────────────────────────────────────── */
    .diagram-toolbar { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .ctrl-btn {
      background: #1e293b; border: 1px solid #334155; border-radius: 6px;
      color: #94a3b8; padding: 5px 12px; font-size: 0.78rem;
      cursor: pointer; transition: all 0.12s; font-family: inherit;
    }
    .ctrl-btn:hover { border-color: #475569; color: #e2e8f0; }
    .ctrl-btn.active { background: #38bdf810; border-color: #38bdf8; color: #38bdf8; }
    .diagram-wrap { background: #fff; border-radius: 10px; padding: 20px; overflow-x: auto; min-height: 180px; }

    .status { padding: 40px; text-align: center; font-size: 0.875rem; }
    .status.load { color: #64748b; }

    /* ── Static startup error (vanilla JS, no blokjs) ────────────────────────── */
    .static-error-page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px; text-align: center;
    }
    .static-error-icon { font-size: 2.5rem; margin-bottom: 20px; }
    .static-error-title { font-size: 1.15rem; font-weight: 700; color: #f87171; margin-bottom: 10px; }
    .static-error-subtitle { font-size: 0.82rem; color: #64748b; margin-bottom: 20px; }
    .script-error-list { list-style: none; margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
    .script-error-item code {
      display: block; background: #1e293b; border: 1px solid #f8717133;
      border-radius: 6px; padding: 8px 14px;
      font-family: ui-monospace, monospace; font-size: 0.78rem; color: #fca5a5;
    }
    .static-error-hint { font-size: 0.78rem; color: #475569; margin-bottom: 20px; max-width: 480px; line-height: 1.6; }
    .static-retry-btn {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      color: #f1f5f9; padding: 10px 28px; font-size: 0.875rem;
      cursor: pointer; font-family: inherit; transition: all 0.12s;
    }
    .static-retry-btn:hover { border-color: #475569; background: #263044; }

    /* ── Startup error component (blokjs-rendered) ───────────────────────────── */
    .startup-error {
      background: #1e293b; border: 1px solid #f8717144; border-radius: 10px;
      padding: 28px; margin-bottom: 20px;
    }
    .startup-error-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .startup-error-badge {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 3px 8px; border-radius: 4px;
      background: #f8717120; color: #f87171; border: 1px solid #f8717155;
      white-space: nowrap;
    }
    .startup-error-title { font-size: 1rem; font-weight: 700; color: #f87171; }
    .startup-error-msg {
      font-size: 0.875rem; color: #e2e8f0; margin-bottom: 16px;
      font-family: ui-monospace, monospace; line-height: 1.6;
    }
    .startup-error-section { margin-top: 14px; }
    .startup-error-section-label {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: #475569; font-weight: 700; margin-bottom: 6px;
    }
    .startup-error-pre {
      background: #0f172a; border: 1px solid #334155; border-radius: 6px;
      padding: 12px; font-size: 0.75rem; color: #94a3b8;
      font-family: ui-monospace, monospace; white-space: pre-wrap;
      word-break: break-all; max-height: 200px; overflow-y: auto;
    }
    .startup-error-status {
      font-size: 0.82rem; font-weight: 700;
      color: #f87171; font-family: ui-monospace, monospace;
    }
    .startup-error-actions { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
    .startup-error-btn {
      background: none; border: 1px solid #334155; border-radius: 6px;
      color: #94a3b8; padding: 8px 18px; font-size: 0.8rem;
      cursor: pointer; transition: all 0.12s; font-family: inherit;
    }
    .startup-error-btn:hover { border-color: #475569; color: #e2e8f0; }
    .startup-error-btn--retry { background: #f8717110; border-color: #f8717155; color: #f87171; }
    .startup-error-btn--retry:hover { background: #f8717120; border-color: #f87171; }
    .startup-error-btn--debug { border-color: #8b5cf644; color: #a78bfa; }
    .startup-error-btn--debug:hover { background: #8b5cf610; border-color: #8b5cf6; }

    /* ── Poll error banner ───────────────────────────────────────────────────── */
    .poll-error-banner {
      background: #f59e0b0a; border: 1px solid #f59e0b33; border-radius: 7px;
      padding: 9px 14px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .poll-error-icon { font-size: 0.85rem; flex-shrink: 0; color: #f59e0b; }
    .poll-error-msg { font-size: 0.78rem; color: #fbbf24; flex: 1; font-family: ui-monospace, monospace; }
    .poll-error-dismiss {
      background: none; border: none; color: #475569; cursor: pointer;
      font-size: 1rem; padding: 0 4px; font-family: inherit; line-height: 1;
    }
    .poll-error-dismiss:hover { color: #94a3b8; }

    /* ── Action error notification ───────────────────────────────────────────── */
    .action-error {
      background: #ef44441a; border: 1px solid #ef444444; border-radius: 7px;
      padding: 9px 14px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .action-error-icon { font-size: 0.85rem; flex-shrink: 0; color: #f87171; }
    .action-error-msg { font-size: 0.78rem; color: #f87171; flex: 1; font-family: ui-monospace, monospace; }
    .action-error-dismiss {
      background: none; border: none; color: #475569; cursor: pointer;
      font-size: 1rem; padding: 0 4px; font-family: inherit; line-height: 1;
    }
    .action-error-dismiss:hover { color: #94a3b8; }

    /* ── Debug panel ─────────────────────────────────────────────────────────── */
    .debug-toolbar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .debug-sub-tab {
      background: none; border: 1px solid #334155; border-radius: 6px;
      color: #64748b; padding: 4px 12px; font-size: 0.76rem;
      cursor: pointer; transition: all 0.12s; font-family: inherit;
    }
    .debug-sub-tab:hover { border-color: #475569; color: #94a3b8; }
    .debug-sub-tab.active { background: #8b5cf610; border-color: #8b5cf6; color: #a78bfa; }
    .debug-clear-btn {
      margin-left: auto;
      background: none; border: 1px solid #1e293b; border-radius: 6px;
      color: #334155; padding: 4px 12px; font-size: 0.76rem;
      cursor: pointer; transition: all 0.12s; font-family: inherit;
    }
    .debug-clear-btn:hover { border-color: #ef4444; color: #f87171; }

    .debug-log {
      background: #080d16; border: 1px solid #1e293b; border-radius: 8px;
      max-height: 620px; overflow-y: auto;
    }
    .debug-empty {
      padding: 40px; text-align: center; color: #1e293b;
      font-size: 0.8rem; font-family: ui-monospace, monospace;
    }
    .debug-entry {
      padding: 7px 14px; border-bottom: 1px solid #0f172a;
      font-family: ui-monospace, monospace; font-size: 0.75rem;
      display: grid;
      grid-template-columns: 6.5rem 3rem 1fr 4rem;
      gap: 8px; align-items: baseline;
    }
    .debug-entry:last-child { border-bottom: none; }
    .debug-entry-ts   { color: #1e293b; white-space: nowrap; }
    .debug-entry-status { font-weight: 700; white-space: nowrap; text-align: center; }
    .debug-entry-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .debug-entry-elapsed { color: #334155; white-space: nowrap; text-align: right; font-size: 0.7rem; }
    .debug-entry-body {
      grid-column: 1 / -1;
      color: #475569; font-size: 0.72rem;
      white-space: pre-wrap; word-break: break-all;
      max-height: 140px; overflow-y: auto;
      background: #0f172a; border-radius: 4px; padding: 6px 10px; margin-top: 2px;
    }
    .debug-entry--ok    .debug-entry-status { color: #10b981; }
    .debug-entry--ok    .debug-entry-label  { color: #334155; }
    .debug-entry--error .debug-entry-status { color: #f87171; }
    .debug-entry--error .debug-entry-label  { color: #fca5a5; }
    .debug-entry--warn  .debug-entry-status { color: #f59e0b; }
    .debug-entry--warn  .debug-entry-label  { color: #fbbf24; }
    .debug-entry--info  .debug-entry-status { color: #38bdf8; }
    .debug-entry--info  .debug-entry-label  { color: #7dd3fc; }

    .debug-state-wrap {
      background: #080d16; border: 1px solid #1e293b; border-radius: 8px;
      max-height: 620px; overflow-y: auto;
    }
    .debug-state-pre {
      padding: 18px; font-family: ui-monospace, monospace; font-size: 0.75rem;
      color: #64748b; white-space: pre; word-break: break-all; line-height: 1.65;
    }
    .debug-state-empty {
      padding: 40px; text-align: center; color: #1e293b;
      font-size: 0.8rem; font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ── Static startup error ───────────────────────────────────────────────────
    // Rendered via vanilla JS when CDN scripts fail — blokjs may not be available.
    function renderStaticStartupError(missing) {
      const items = missing.map(function(name) {
        return '<li class="script-error-item"><code>' + name + '</code></li>';
      }).join('');
      document.getElementById('app').innerHTML =
        '<div class="static-error-page">' +
          '<div class="static-error-icon">\u26a0</div>' +
          '<h1 class="static-error-title">Startup Failed \u2014 Scripts Did Not Load</h1>' +
          '<p class="static-error-subtitle">The following dependencies could not be fetched from CDN:</p>' +
          '<ul class="script-error-list">' + items + '</ul>' +
          '<p class="static-error-hint">Check your network connection and that jsDelivr CDN is reachable from this host. The webview requires js-yaml, mermaid, and blokjs to run.</p>' +
          '<button class="static-retry-btn" onclick="location.reload()">\u21ba Retry</button>' +
        '</div>';
    }

    // ── Dependency check ───────────────────────────────────────────────────────
    console.log('[calypso] script reached dependency check');
    var __missing = (window.__missingScripts || []).slice();
    if (typeof jsyaml  === 'undefined' && __missing.indexOf('js-yaml')  === -1) __missing.push('js-yaml (loaded silently without error but undefined)');
    if (typeof mermaid === 'undefined' && __missing.indexOf('mermaid')  === -1) __missing.push('mermaid (loaded silently without error but undefined)');
    if (typeof blok    === 'undefined' && __missing.indexOf('blokjs')   === -1) __missing.push('blokjs (loaded silently without error but undefined)');
    console.log('[calypso] CDN scripts missing:', __missing.length ? __missing : 'none');

    if (__missing.length > 0) {
      renderStaticStartupError(__missing);
    } else {
    console.log('[calypso] all CDN deps present, calling blok.mount');

    // ── Mermaid init ───────────────────────────────────────────────────────────
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      flowchart: { curve: 'basis', padding: 24, nodeSpacing: 50, rankSpacing: 60 },
      themeVariables: {
        primaryColor: '#f8fafc',
        primaryTextColor: '#1e293b',
        primaryBorderColor: '#cbd5e1',
        lineColor: '#64748b',
        background: '#ffffff',
        edgeLabelBackground: '#f1f5f9',
        fontSize: '13px',
      },
    });

    // ── Constants ──────────────────────────────────────────────────────────────

    const KIND = {
      agent:         { color: '#3b82f6', label: 'Agent' },
      deterministic: { color: '#475569', label: 'Deterministic' },
      'git-hook':    { color: '#f97316', label: 'Git Hook' },
      human:         { color: '#f59e0b', label: 'Human' },
      github:        { color: '#10b981', label: 'GitHub' },
      terminal:      { color: '#8b5cf6', label: 'Terminal' },
      workflow:      { color: '#0ea5e9', label: 'Workflow' },
    };

    const POLL_MS = 2000;

    function logTs() {
      return new Date().toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ── Mermaid helpers ────────────────────────────────────────────────────────

    function sid(id) { return id.replace(/-/g, '_'); }

    function nodeShape(kind) {
      switch (kind) {
        case 'deterministic': return ['[',  ']' ];
        case 'human':         return ['{{', '}}'];
        case 'github':        return ['([', '])'];
        case 'terminal':      return ['((', '))'];
        case 'workflow':      return ['[[', ']]'];
        default:              return ['(',  ')' ];
      }
    }

    function safeLabel(s) { return s.replace(/[<>{}"|]/g, ''); }
    function mermaidClass(kind) { return (kind || 'agent').replace(/-/g, '_'); }

    function classDefs() {
      return Object.entries(KIND).map(([k, { color }]) => {
        const darkText = k === 'human' || k === 'git-hook';
        const tc = darkText ? '#1e293b' : '#fff';
        return `  classDef ${mermaidClass(k)} fill:${color},stroke:${color}cc,color:${tc}`;
      });
    }

    function extractEdges(states) {
      const edges = [];
      const push = (from, label, to) => {
        if (to && states[to]) edges.push({ from: sid(from), label, to: sid(to) });
      };
      for (const [id, s] of Object.entries(states)) {
        const n = s?.next;
        if (!n) continue;
        if (n.on_success)   push(id, 'success',   n.on_success);
        if (n.on_failure)   push(id, 'failure',   n.on_failure);
        if (n.on_rejection) push(id, 'rejection', n.on_rejection);
        if (n.on_complete)  push(id, 'complete',  n.on_complete);
        if (n.on_pass)      push(id, 'pass',      n.on_pass);
        if (n.on_fail)      push(id, 'fail',      n.on_fail);
        if (n.pass)         push(id, 'pass',      n.pass);
        if (n.fail)         push(id, 'fail',      n.fail);
        const onMap = n.on || n[true];
        if (onMap && typeof onMap === 'object') {
          for (const [cond, to] of Object.entries(onMap)) push(id, String(cond), String(to));
        }
      }
      return edges;
    }

    function resolveTarget(toId, parentStates, wfsByName) {
      const s = parentStates[toId];
      if (s?.kind === 'workflow') {
        const sub = wfsByName[s.workflow];
        if (sub?.initial_state) return `${sid(toId)}__${sid(sub.initial_state)}`;
      }
      return sid(toId);
    }

    function buildMermaid(doc, wfsByName, activeState) {
      const states = doc.states || {};
      const lines = ['flowchart TD'];
      const cls = [];

      for (const [id, s] of Object.entries(states)) {
        if (s?.kind === 'workflow') {
          const sub = wfsByName[s.workflow];
          const pfx = `${sid(id)}__`;
          if (sub?.states) {
            lines.push(`  subgraph ${sid(id)}["${id}"]`);
            for (const [subId, subS] of Object.entries(sub.states)) {
              const [o, c] = nodeShape(subS?.kind);
              lines.push(`    ${pfx}${sid(subId)}${o}"${subId}"${c}`);
              cls.push(`  class ${pfx}${sid(subId)} ${mermaidClass(subS?.kind)}`);
            }
            for (const { from, label, to } of extractEdges(sub.states)) {
              lines.push(`    ${pfx}${from} -->|${safeLabel(label)}| ${pfx}${to}`);
            }
            lines.push(`  end`);
          } else {
            lines.push(`  ${sid(id)}[["${id}\\n(${s.workflow})"]]]`);
            cls.push(`  class ${sid(id)} ${mermaidClass('workflow')}`);
          }
        } else {
          const [o, c] = nodeShape(s?.kind);
          lines.push(`  ${sid(id)}${o}"${id}"${c}`);
          cls.push(`  class ${sid(id)} ${mermaidClass(s?.kind)}`);
        }
      }
      lines.push('');

      for (const [id, s] of Object.entries(states)) {
        const n = s?.next;
        if (!n) continue;
        if (s?.kind === 'workflow') {
          const sub = wfsByName[s.workflow];
          if (!sub?.states) continue;
          const pfx = `${sid(id)}__`;
          const onMap = n.on || n[true];
          if (!onMap || typeof onMap !== 'object') continue;
          for (const [exitId, target] of Object.entries(onMap)) {
            const tgt = String(target);
            if (!states[tgt] || !sub.states[exitId]) continue;
            lines.push(`  ${pfx}${sid(exitId)} -->|${safeLabel(String(exitId))}| ${resolveTarget(tgt, states, wfsByName)}`);
          }
        } else {
          const addEdge = (label, to) => {
            if (!to || !states[to]) return;
            lines.push(`  ${sid(id)} -->|${safeLabel(label)}| ${resolveTarget(to, states, wfsByName)}`);
          };
          if (n.on_success)   addEdge('success',   n.on_success);
          if (n.on_failure)   addEdge('failure',   n.on_failure);
          if (n.on_rejection) addEdge('rejection', n.on_rejection);
          if (n.on_complete)  addEdge('complete',  n.on_complete);
          if (n.on_pass)      addEdge('pass',      n.on_pass);
          if (n.on_fail)      addEdge('fail',      n.on_fail);
          if (n.pass)         addEdge('pass',      n.pass);
          if (n.fail)         addEdge('fail',      n.fail);
          const onMap = n.on || n[true];
          if (onMap && typeof onMap === 'object') {
            for (const [cond, to] of Object.entries(onMap)) addEdge(String(cond), String(to));
          }
        }
      }
      lines.push('');

      lines.push(...classDefs(), ...cls);

      if (activeState && states[activeState]) {
        lines.push('  classDef activeState fill:#f59e0b,stroke:#d97706,color:#1e293b,stroke-width:3px');
        lines.push(`  class ${sid(activeState)} activeState`);
      }

      return lines.join('\n');
    }

    function buildHolisticMermaid(docs) {
      if (!docs.length) return 'flowchart TD\n  empty["No workflows loaded"]';
      const lines = ['flowchart TD'];
      const cls = [];
      for (let i = 0; i < docs.length; i++) {
        const doc = docs[i];
        const p = `wf${i}`;
        const states = doc.states || {};
        const label = (doc.name || `Workflow ${i + 1}`).replace(/"/g, '');
        lines.push(`  subgraph ${p}["${label}"]`);
        for (const [id, s] of Object.entries(states)) {
          const [o, c] = nodeShape(s?.kind);
          lines.push(`    ${p}_${sid(id)}${o}"${id}"${c}`);
          cls.push(`  class ${p}_${sid(id)} ${mermaidClass(s?.kind)}`);
        }
        for (const { from, label: lbl, to } of extractEdges(states)) {
          lines.push(`    ${p}_${from} -->|${safeLabel(lbl)}| ${p}_${to}`);
        }
        lines.push(`  end`);
        lines.push('');
      }
      lines.push(...classDefs(), ...cls);
      return lines.join('\n');
    }

    // ── App ────────────────────────────────────────────────────────────────────

    blok.mount('#app', {
      state: {
        // Workflow data
        allDocs: [],
        workflowsByName: {},
        selectedWfName: '',
        doc: null,
        // Live state
        activeWorkflow: null,
        activeState: null,
        activeStateKind: null,
        availableTransitions: [],
        cronWorkflows: [],
        // UI
        view: 'diagram',
        holistic: false,
        liveFlash: false,
        loading: true,
        kindEntries: Object.entries(KIND).map(([key, { color, label }]) => ({ key, color, label })),
        // Startup error — each field is a plain string to avoid null→{} blokjs quirk
        startupErrorPhase: '',
        startupErrorMsg: '',
        startupErrorStatus: '',
        startupErrorBody: '',
        // Runtime errors
        pollError: '',
        actionError: '',
        // Debug
        debugLog: [],
        lastStateJson: '',
        debugSubview: 'log',
      },

      computed: {
        wfNames() { return this.allDocs.map(d => d?._stem || d?.name).filter(Boolean); },
        hasActiveWorkflow() { return !!this.activeWorkflow; },
        hasActiveState() { return !!this.activeState; },
        activeWorkflowLabel() { return this.activeWorkflow || 'none'; },
        activeStateLabel() { return this.activeState || 'none'; },
        kindBadgeLabel() { return KIND[this.activeStateKind]?.label || ''; },
        kindBadgeBg() { const k = KIND[this.activeStateKind]; return k ? `${k.color}22` : ''; },
        kindBadgeColor() { return KIND[this.activeStateKind]?.color || ''; },
        kindBadgeBorder() { const k = KIND[this.activeStateKind]; return k ? `1px solid ${k.color}55` : 'none'; },
        isViewDiagram() { return this.view === 'diagram'; },
        isViewCron() { return this.view === 'cron'; },
        isViewDebug() { return this.view === 'debug'; },
        showTriggerPanel() { return this.activeStateKind === 'human' && this.availableTransitions.length > 0; },
        showCronPanel() { return this.cronWorkflows.length > 0; },
        holisticBtnText() { return this.holistic ? '\u2296 collapse' : '\u2295 expand all'; },
        // Startup error
        hasStartupError() { return typeof this.startupErrorMsg === 'string' && this.startupErrorMsg.length > 0; },
        showMainContent() { return !this.hasStartupError && !this.loading; },
        startupPhaseBadge() {
          const labels = { fetch: 'HTTP Error', parse: 'Parse Error', network: 'Network Error', yaml: 'YAML Error' };
          return labels[this.startupErrorPhase] || 'Startup Error';
        },
        hasStartupStatus() { return typeof this.startupErrorStatus === 'string' && this.startupErrorStatus.length > 0; },
        hasStartupBody() { return typeof this.startupErrorBody === 'string' && this.startupErrorBody.length > 0; },
        // Runtime errors
        hasPollError() { return typeof this.pollError === 'string' && this.pollError.length > 0; },
        hasActionError() { return typeof this.actionError === 'string' && this.actionError.length > 0; },
        // Debug
        hasDebugLog() { return this.debugLog.length > 0; },
        isDebugSubviewLog() { return this.debugSubview === 'log'; },
        isDebugSubviewState() { return this.debugSubview === 'state'; },
        hasLastState() { return typeof this.lastStateJson === 'string' && this.lastStateJson.length > 0; },
        formattedState() {
          if (!this.lastStateJson) return '';
          try { return JSON.stringify(JSON.parse(this.lastStateJson), null, 2); }
          catch { return this.lastStateJson; }
        },
      },

      methods: {
        mount() {
          console.log('[calypso] mount() lifecycle called');
          this.loadWorkflows().then(() => {
            console.log('[calypso] loadWorkflows() resolved, startupErrorMsg:', this.startupErrorMsg || '(none)');
            if (!this.startupErrorMsg) this.pollState();
          });
          this._pollTimer = setInterval(() => this.pollState(), POLL_MS);
        },

        unmount() {
          clearInterval(this._pollTimer);
        },

        // ── Debug logging ──────────────────────────────────────────────────────

        addLog(entry) {
          try {
            if (!entry.id) entry.id = performance.now() + Math.random();
            const prev = Array.isArray(this.debugLog) ? this.debugLog : [];
            this.debugLog = [entry].concat(prev).slice(0, 500);
          } catch (_) {}
        },

        // ── Tracked fetch — logs all requests to the debug panel ───────────────

        async trackedFetch(url, opts) {
          const ts = logTs();
          const t0 = performance.now();
          const method = (opts && opts.method) || 'GET';
          console.log('[calypso] fetch ->', method, url);
          try {
            const res = await fetch(url, opts);
            const elapsed = Math.round(performance.now() - t0) + 'ms';
            let body = '';
            try { body = await res.clone().text(); } catch (_) {}
            if (body.length > 2000) body = body.slice(0, 2000) + '\n\u2026 (truncated)';
            this.addLog({
              ts,
              cssClass: 'debug-entry ' + (res.ok ? 'debug-entry--ok' : 'debug-entry--error'),
              label: method + ' ' + url,
              status: String(res.status),
              elapsed,
              body,
            });
            console.log('[calypso] fetch <-', method, url, res.status, Math.round(performance.now() - t0) + 'ms');
            return res;
          } catch (e) {
            const elapsed = Math.round(performance.now() - t0) + 'ms';
            const msg = e instanceof Error ? e.message : String(e);
            console.error('[calypso] fetch error', method, url, msg);
            this.addLog({
              ts,
              cssClass: 'debug-entry debug-entry--error',
              label: method + ' ' + url,
              status: 'ERR',
              elapsed,
              body: msg,
            });
            throw e;
          }
        },

        // ── Startup: load workflows ────────────────────────────────────────────

        async loadWorkflows() {
          console.log('[calypso] loadWorkflows() start');
          this.startupErrorPhase = '';
          this.startupErrorMsg = '';
          this.startupErrorStatus = '';
          this.startupErrorBody = '';
          try {
            let res;
            try {
              res = await this.trackedFetch('/api/workflows');
            } catch (e) {
              const msg = e instanceof Error ? e.message : String(e);
              this.startupErrorPhase = 'network';
              this.startupErrorMsg = 'Could not reach the Calypso server: ' + msg;
              return;
            }

            if (!res.ok) {
              let body = '';
              try { body = await res.text(); } catch (_) {}
              this.startupErrorPhase = 'fetch';
              this.startupErrorMsg = '/api/workflows returned ' + res.status;
              this.startupErrorStatus = String(res.status);
              this.startupErrorBody = body;
              return;
            }

            let entries;
            try {
              entries = await res.json();
            } catch (e) {
              const msg = e instanceof Error ? e.message : String(e);
              this.startupErrorPhase = 'parse';
              this.startupErrorMsg = 'Failed to parse /api/workflows response as JSON: ' + msg;
              return;
            }

            const docs = entries.map(({ name, yaml }) => {
              try {
                const doc = jsyaml.load(yaml);
                if (doc) doc._stem = name;
                return doc;
              } catch (e) {
                const msg = e instanceof Error ? e.message : String(e);
                this.addLog({
                  ts: logTs(),
                  cssClass: 'debug-entry debug-entry--warn',
                  label: 'YAML parse: ' + name,
                  status: 'WARN',
                  elapsed: '',
                  body: msg,
                });
                return null;
              }
            }).filter(Boolean);

            this.allDocs = docs;
            const map = {};
            for (const d of docs) {
              if (d?.name) map[d.name] = d;
              if (d?._stem) map[d._stem] = d;
            }
            this.workflowsByName = map;
          } finally {
            this.loading = false;
          }
        },

        // ── State polling ──────────────────────────────────────────────────────

        async pollState() {
          if (this.hasStartupError) return;

          let res;
          try {
            res = await this.trackedFetch('/api/state');
          } catch (e) {
            const msg = e instanceof Error ? e.message : String(e);
            this.pollError = 'Cannot reach server: ' + msg;
            return;
          }

          if (!res.ok) {
            this.pollError = '/api/state returned ' + res.status;
            return;
          }

          let json;
          try { json = await res.text(); } catch (e) {
            this.pollError = 'Failed to read state response';
            return;
          }

          if (json === this._lastStateJson) return;
          this._lastStateJson = json;
          this.lastStateJson = json;
          this.pollError = '';

          let data;
          try { data = JSON.parse(json); } catch (e) {
            this.pollError = 'State JSON parse error: ' + (e instanceof Error ? e.message : String(e));
            return;
          }

          const ws = data.workflow_state;
          const newWf = (ws && (ws.workflow || ws.active_workflow)) || null;
          const newState = (ws && (ws.state || ws.current_state)) || null;

          if (newWf !== this.activeWorkflow || newState !== this.activeState) {
            this.liveFlash = true;
            setTimeout(() => { this.liveFlash = false; }, 800);
          }

          this.activeWorkflow = newWf;
          this.activeState = newState;
          this.activeStateKind = data.active_state_kind || null;
          this.availableTransitions = data.active_transitions || [];
          this.cronWorkflows = data.cron_workflows || [];

          if (this.activeWorkflow && !this.selectedWfName) {
            const d = this.workflowsByName[this.activeWorkflow];
            if (d) this.doc = d;
          }
        },

        // ── Actions ────────────────────────────────────────────────────────────

        async triggerEvent(ev) {
          try {
            const res = await this.trackedFetch('/api/trigger', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ event: ev }),
            });
            if (!res.ok) {
              this.actionError = 'Trigger "' + ev + '" returned HTTP ' + res.status;
            }
          } catch (e) {
            this.actionError = 'Trigger "' + ev + '" failed: ' + (e instanceof Error ? e.message : String(e));
          }
        },

        async cronNow(workflow) {
          try {
            const res = await this.trackedFetch('/api/cron-now', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ workflow }),
            });
            if (!res.ok) {
              this.actionError = 'Run "' + workflow + '" returned HTTP ' + res.status;
            }
          } catch (e) {
            this.actionError = 'Run "' + workflow + '" failed: ' + (e instanceof Error ? e.message : String(e));
          }
        },

        // ── UI controls ────────────────────────────────────────────────────────

        setView(v) { this.view = v; },
        setDebugSubview(v) { this.debugSubview = v; },
        toggleHolistic() { this.holistic = !this.holistic; },
        dismissPollError() { this.pollError = ''; },
        dismissActionError() { this.actionError = ''; },
        clearDebugLog() { this.debugLog = []; },

        async retryLoad() {
          this.loading = true;
          await this.loadWorkflows();
          if (!this.startupErrorMsg) this.pollState();
        },

        // ── Mermaid rendering ──────────────────────────────────────────────────

        async renderMermaid() {
          const el = this.refs.mgContainer;
          if (!el) return;

          const wfsByName = {};
          for (const d of (this.allDocs || [])) {
            if (d?.name) wfsByName[d.name] = d;
            if (d?._stem) wfsByName[d._stem] = d;
          }

          let def;
          if (this.holistic && this.allDocs?.length) {
            def = buildHolisticMermaid(this.allDocs);
          } else if (this.doc?.states) {
            def = buildMermaid(this.doc, wfsByName, this.activeState);
          } else {
            el.innerHTML = '<p style="color:#64748b;padding:20px">No states found in document.</p>';
            return;
          }

          el.innerHTML = '<p style="color:#94a3b8;padding:20px;text-align:center">Rendering\u2026</p>';
          try {
            const { svg } = await mermaid.render('mg' + Date.now(), def);
            el.innerHTML = svg;
            const s = el.querySelector('svg');
            if (s) { s.style.width = '100%'; s.style.height = 'auto'; s.style.maxWidth = '100%'; }
          } catch (e) {
            const msg = e instanceof Error ? e.message : String(e);
            this.addLog({
              ts: logTs(),
              cssClass: 'debug-entry debug-entry--error',
              label: 'mermaid render error',
              status: 'ERR',
              elapsed: '',
              body: msg + '\n\nDefinition:\n' + def,
            });
            el.innerHTML = `<pre style="color:#f87171;padding:16px;font-size:0.75rem;white-space:pre-wrap">${msg}\n\n${def}</pre>`;
          }
        },
      },

      watch: {
        async doc() { await this.renderMermaid(); },
        async activeState() { await this.renderMermaid(); },
        async holistic() { await this.renderMermaid(); },
        async allDocs() { await this.renderMermaid(); },
        selectedWfName() {
          if (this.selectedWfName) {
            const d = this.workflowsByName[this.selectedWfName];
            if (d) this.doc = d;
          }
        },
      },

                          {
                            div: {
                              class: 'diagram-wrap',
                              children: [{ div: { ref: 'mgContainer' } }],
                            },
                          },
                        ],
                      },

                      // ── Cron tab ────────────────────────────────────────────────
                      {
                        when: $.isViewCron,
                        children: [
                          {
                            when: $.showCronPanel,
                            children: [
                              {
                                div: {
                                  class: 'cron-panel',
                                  children: [
                                    { div: { class: 'cron-title', text: '\u23f1 Scheduled workflows' } },
                                    {
                                      each: $.cronWorkflows,
                                      as: 'cw',
                                      key: 'cw.name',
                                      children: [
                                        {
                                          div: {
                                            class: 'cron-row',
                                            children: [
                                              { button: { class: 'cron-run-btn', click: 'cronNow(cw.name)', text: '\u25b6 Run now' } },
                                              { span: { class: 'cron-name', text: $.cw.name } },
                                              { when: $.cw.cron, children: [{ span: { class: 'cron-expr', text: $.cw.cron } }] },
                                              { when: $.cw.description, children: [{ span: { class: 'cron-desc', text: $.cw.description } }] },
                                            ],
                                          },
                                        },
                                      ],
                                    },
                                  ],
                                },
                              },
                            ],
                          },
                          {
                            when: $.not.showCronPanel,
                            children: [{ div: { class: 'status load', text: 'No scheduled workflows found.' } }],
                          },
                        ],
                      },

                    ],
                  },

                  // ── Debug tab (always accessible, even on startup error) ─────────
                  {
                    when: $.isViewDebug,
                    children: [
                      {
                        div: {
                          class: 'debug-panel',
                          children: [
                            // Toolbar
                            {
                              div: {
                                class: 'debug-toolbar',
                                children: [
                                  { button: { class: { 'debug-sub-tab': true, active: $.isDebugSubviewLog }, click: "setDebugSubview('log')", text: 'Request log' } },
                                  { button: { class: { 'debug-sub-tab': true, active: $.isDebugSubviewState }, click: "setDebugSubview('state')", text: 'Live state' } },
                                  { button: { class: 'debug-clear-btn', click: 'clearDebugLog', text: 'Clear log' } },
                                ],
                              },
                            },

                            // Request log
                            {
                              when: $.isDebugSubviewLog,
                              children: [
                                {
                                  div: {
                                    class: 'debug-log',
                                    children: [
                                      {
                                        when: $.not.hasDebugLog,
                                        children: [{ div: { class: 'debug-empty', text: 'No requests yet.' } }],
                                      },
                                      {
                                        when: $.hasDebugLog,
                                        children: [
                                          {
                                            each: $.debugLog,
                                            as: 'entry',
                                            key: 'entry.id',
                                            children: [
                                              {
                                                div: {
                                                  class: $.entry.cssClass,
                                                  children: [
                                                    { span: { class: 'debug-entry-ts', text: $.entry.ts } },
                                                    { span: { class: 'debug-entry-status', text: $.entry.status } },
                                                    { span: { class: 'debug-entry-label', text: $.entry.label } },
                                                    { span: { class: 'debug-entry-elapsed', text: $.entry.elapsed } },
                                                    {
                                                      when: $.entry.body,
                                                      children: [{ pre: { class: 'debug-entry-body', text: $.entry.body } }],
                                                    },
                                                  ],
                                                },
                                              },
                                            ],
                                          },
                                        ],
                                      },
                                    ],
                                  },
                                },
                              ],
                            },

                            // Live state dump
                            {
                              when: $.isDebugSubviewState,
                              children: [
                                {
                                  div: {
                                    class: 'debug-state-wrap',
                                    children: [
                                      {
                                        when: $.hasLastState,
                                        children: [{ pre: { class: 'debug-state-pre', text: $.formattedState } }],
                                      },
                                      {
                                        when: $.not.hasLastState,
                                        children: [{ div: { class: 'debug-state-empty', text: 'No state received yet.' } }],
                                      },
                                    ],
                                  },
                                },
                              ],
                            },

                          ],
                        },
                      },
                    ],
                  },

                ],
              },
            },

          ],
        },
      }),
    });

    } // end dependency check
  </script>
</body>
</html>
