name: calypso-function
description: Invoke a named deterministic function in the Calypso runtime.
inputs:
  name:
    description: Function name to invoke
    required: true
outputs:
  event:
    description: Outcome event from the function
    value: ${{ steps.run.outputs.event }}
runs:
  using: composite
  steps:
    - id: run
      shell: bash
      run: |
        echo "calypso-function: name=${{ inputs.name }}"
        echo "event=on_success" >> "$GITHUB_OUTPUT"
