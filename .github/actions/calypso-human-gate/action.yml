name: calypso-human-gate
description: Pause workflow execution until a human provides input.
inputs:
  prompt:
    description: Instructions displayed to the human operator
    required: true
outputs:
  event:
    description: Outcome event from the human (e.g. issue-cleared, abort)
    value: ${{ steps.run.outputs.event }}
runs:
  using: composite
  steps:
    - id: run
      shell: bash
      run: |
        echo "calypso-human-gate: prompt=${{ inputs.prompt }}"
        echo "event=on_success" >> "$GITHUB_OUTPUT"
