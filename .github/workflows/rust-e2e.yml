name: Rust end-to-end tests — cli

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  merge_group:
  schedule:
    - cron: "35 1 * * *"
  workflow_dispatch:

concurrency:
  group: rust-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust_relevant: ${{ steps.diff.outputs.rust_relevant }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false

      - name: Detect Rust-relevant changes
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "merge_group" ]]; then
            echo "rust_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              echo "rust_relevant=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # After a force-push rebase the before-SHA may no longer be
            # reachable in the shallow clone; treat that as fully relevant.
            if ! git cat-file -e "$base" 2>/dev/null; then
              echo "rust_relevant=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "rust_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed="$(git diff --name-only "$base" "$head")"

          if grep -Eq '^(crates/calypso-cli/|crates/nightshift-core/|crates/calypso-web/|calypso-blueprint/|Cargo.toml$|Cargo.lock$|\.github/workflows/rust-e2e\.yml$)' <<<"$changed"; then
            echo "rust_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust_relevant=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Skip end-to-end tests when Rust-relevant files are unchanged
        if: needs.changes.outputs.rust_relevant != 'true'
        run: echo "No Rust-relevant changes detected; end-to-end tests skipped."

      - uses: actions/checkout@v5
        if: needs.changes.outputs.rust_relevant == 'true'
        with:
          submodules: false
      - name: Init submodules (non-recursive)
        if: needs.changes.outputs.rust_relevant == 'true'
        run: git submodule update --init calypso-blueprint

      - name: Set up Rust
        # End-to-end behavior is expected to stay green on the current stable
        # toolchain even while quality/build compatibility spans older versions.
        if: needs.changes.outputs.rust_relevant == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        if: needs.changes.outputs.rust_relevant == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/calypso-cli -> target

      - name: Run end-to-end tests
        if: needs.changes.outputs.rust_relevant == 'true'
        working-directory: crates/calypso-cli
        run: cargo test-e2e

      - name: Run select-flow end-to-end tests
        if: needs.changes.outputs.rust_relevant == 'true'
        working-directory: crates/calypso-cli
        run: cargo test-select-flow
