name: Init Integration Test

on:
  push:
    branches: [ main, feat/hello-world-init ]
  pull_request:
    branches: [ main ]

concurrency:
  group: init-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      init_relevant: ${{ steps.diff.outputs.init_relevant }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false

      - name: Detect init-relevant changes
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "merge_group" ]]; then
            echo "init_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              echo "init_relevant=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # After a force-push rebase the before-SHA may no longer be
            # reachable in the shallow clone; treat that as fully relevant.
            if ! git cat-file -e "$base" 2>/dev/null; then
              echo "init_relevant=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "init_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed="$(git diff --name-only "$base" "$head")"

          if grep -Eq '^(crates/calypso-cli/|crates/nightshift-core/|crates/calypso-web/|calypso-blueprint/|Cargo.toml$|Cargo.lock$|\.github/workflows/init-test\.yml$)' <<<"$changed"; then
            echo "init_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "init_relevant=false" >> "$GITHUB_OUTPUT"
          fi

  test-init:
    needs: changes
    name: Test CLI Initialization
    runs-on: ubuntu-latest
    steps:
      - name: Skip init integration test when init-relevant files are unchanged
        if: needs.changes.outputs.init_relevant != 'true'
        run: echo "No init-relevant changes detected; init integration test skipped."

      - name: Checkout Code
        if: needs.changes.outputs.init_relevant == 'true'
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init calypso-blueprint submodule
        if: needs.changes.outputs.init_relevant == 'true'
        run: git submodule update --init calypso-blueprint

      - name: Setup Rust
        if: needs.changes.outputs.init_relevant == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Calypso CLI
        if: needs.changes.outputs.init_relevant == 'true'
        run: cargo build -p calypso-cli

      - name: Verify init is no longer a first-class product command
        if: needs.changes.outputs.init_relevant == 'true'
        run: |
          # The `init` command has been removed from the primary product surface.
          # Running `calypso-cli init` must fall through to the help output
          # (the unknown-command catch-all) and exit 0.
          output=$(./target/debug/calypso-cli init 2>&1)
          if ! echo "$output" | grep -q "Usage:"; then
            echo "Expected help output for removed init command, got: $output"
            exit 1
          fi
          echo "✅ init correctly falls through to help (deprecated command removed)"
