name: Rust quality — cli

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/rust-quality.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/rust-quality.yml"
  schedule:
    - cron: "05 1 * * *"
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # We do not declare a project-wide rust-version, but quality/build
          # compatibility is intentionally exercised starting from 1.85.0.
          - label: msrv
            toolchain: "1.85.0"
          # Keep the pinned coverage toolchain in the matrix so quality checks
          # are evaluated on the same compiler used for coverage totals.
          - label: coverage-pinned
            toolchain: "1.94.0"
          # Stable remains the main compatibility target for day-to-day use.
          - label: stable
            toolchain: stable
    name: format (${{ matrix.label }} / rust ${{ matrix.toolchain }})

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Check formatting
        working-directory: cli
        run: cargo fmt-check

  clippy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: msrv
            toolchain: "1.85.0"
          - label: coverage-pinned
            toolchain: "1.94.0"
          - label: stable
            toolchain: stable
    name: clippy (${{ matrix.label }} / rust ${{ matrix.toolchain }})

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Run clippy
        working-directory: cli
        run: cargo lint

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: msrv
            toolchain: "1.85.0"
          - label: coverage-pinned
            toolchain: "1.94.0"
          - label: stable
            toolchain: stable
    name: build (${{ matrix.label }} / rust ${{ matrix.toolchain }})

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Build
        working-directory: cli
        run: cargo build-check
