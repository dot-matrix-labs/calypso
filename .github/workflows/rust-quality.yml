name: Rust quality — cli

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: stable / rust stable
            toolchain: stable
          - name: msrv / rust 1.88.0
            toolchain: "1.88.0"
          - name: coverage-pinned / rust 1.94.0
            toolchain: "1.94.0"

    name: format (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Init submodules (non-recursive)
        run: git submodule update --init

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Check formatting
        working-directory: cli
        run: cargo fmt-check

  clippy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: stable / rust stable
            toolchain: stable
          - name: msrv / rust 1.88.0
            toolchain: "1.88.0"
          - name: coverage-pinned / rust 1.94.0
            toolchain: "1.94.0"

    name: clippy (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Init submodules (non-recursive)
        run: git submodule update --init

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Run clippy
        working-directory: cli
        run: cargo lint

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: stable / rust stable
            toolchain: stable
          - name: msrv / rust 1.88.0
            toolchain: "1.88.0"
          - name: coverage-pinned / rust 1.94.0
            toolchain: "1.94.0"

    name: build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Init submodules (non-recursive)
        run: git submodule update --init

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Build
        working-directory: cli
        run: cargo build-check
