# Implementation loop — runs continuously until interrupted
#
# Workflow shape: implementation loop → inspect backlog → do work → summarize → restart
#
# Copy this file, rename it, and adapt the state names and transitions to fit
# your development workflow.  The `loop` action returns execution to `inspect`
# so the agent keeps pulling and implementing backlog items until interrupted.
#
# Schema: minimum supported headless YAML state-machine (nightshift-core)

name: implementation-loop
initial_state: inspect

states:
  # Read the backlog and choose the next item to implement.
  - name: inspect
    action: agent
    on_success: implement
    on_failure: error

  # Carry out the implementation work for the chosen item.
  - name: implement
    action: agent
    on_success: summarize
    on_failure: error

  # Write a short summary of what was done and update any tracking documents.
  - name: summarize
    action: agent
    on_success: restart
    on_failure: error

  # Loop unconditionally back to inspect so the next backlog item is picked up.
  - name: restart
    action: loop
    target: inspect

  # Terminal error state — execution stops here on unrecoverable failure.
  - name: error
    action: terminal
