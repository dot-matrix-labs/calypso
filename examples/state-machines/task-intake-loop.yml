# Task intake loop — runs continuously until interrupted
#
# Workflow shape: task intake → choose task → execute task → report → restart
#
# Copy this file, rename it, and adapt the state names and transitions to fit
# your project.  The `loop` action at the end of each cycle sends execution
# back to `intake` so the machine keeps running until you press Ctrl-C.
#
# Schema: minimum supported headless YAML state-machine (nightshift-core)

name: task-intake-loop
initial_state: intake

states:
  # Collect new tasks from the environment (issues, messages, tickets …).
  - name: intake
    action: agent
    on_success: choose
    on_failure: error

  # Select the highest-priority task from the collected list.
  - name: choose
    action: agent
    on_success: execute
    on_failure: restart

  # Work on the selected task until it is complete or blocked.
  - name: execute
    action: agent
    on_success: report
    on_failure: error

  # Summarise what was done and record the outcome.
  - name: report
    action: agent
    on_success: restart
    on_failure: error

  # Loop unconditionally back to intake so the cycle repeats.
  - name: restart
    action: loop
    target: intake

  # Terminal error state — execution stops here on unrecoverable failure.
  - name: error
    action: terminal
